<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" width="60" height="60">
  <!-- Cuerpo del calendario -->
  <rect x="3" y="5" width="18" height="17" rx="2" ry="2" fill="#9d6420"/>
  <!-- Barra superior oscura -->
  <rect x="3" y="5" width="18" height="5" rx="2" ry="2" fill="#7a4d18"/>
  <!-- Argollas -->
  <line x1="8" y1="3" x2="8" y2="7" stroke="#9d6420" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="3" x2="16" y2="7" stroke="#9d6420" stroke-width="2" stroke-linecap="round"/>
  <!-- Cuadrícula de días (3 filas x 4 cols) -->
  <rect x="5" y="13" width="3" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="10.5" y="13" width="3" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="16" y="13" width="3" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="5" y="17" width="3" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="10.5" y="17" width="3" height="2.5" rx="0.5" fill="white" opacity="0.9"/>
  <rect x="16" y="17" width="3" height="2.5" rx="0.5" fill="white" opacity="0.6"/>
</svg>